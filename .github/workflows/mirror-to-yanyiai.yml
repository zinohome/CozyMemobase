name: Mirror to yanyiai

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "*"

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push mirror
        env:
          GH_TOKEN: ${{ secrets.A_TO_B_MIRROR_TOKEN }}
          DEST_REPO: yanyiai/CozyMemobase
        run: |
          set -euo pipefail
          auth="$(printf '%s:%s' 'x-access-token' "$GH_TOKEN" | base64 | tr -d '\n')"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic $auth" \
            push --mirror "https://github.com/${DEST_REPO}.git"
