name: Mirror to yanyiai

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Push to GitHub-B
        env:
          MIRROR_TOKEN: ${{ secrets.A_TO_B_MIRROR_TOKEN }}
        run: |
          set -e
          git remote remove mirror || true
          git remote add mirror "https://x-access-token:${MIRROR_TOKEN}@github.com/yanyiai/${{ github.event.repository.name }}.git"
          git push mirror --all
          git push mirror --tags
