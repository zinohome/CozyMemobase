name: token-check

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check repo visibility with token
        env:
          T: ${{ secrets.A_TO_B_MIRROR_TOKEN }}
        run: |
          code=$(curl -s -o /tmp/r.json -w "%{http_code}" \
            -H "Authorization: token ${T}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/yanyiai/CozyMemobase)
          echo "status=$code"
          test "$code" = "200"
